name: verify-refs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: verify-refs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out agentlang-index
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          # No workspace-root go.mod; corpus tasks each carry their own under corpus/*/.
          cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install libcurl headers for Zero std.http
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Install tsx for TypeScript ref impls
        run: npm install -g tsx

      - name: Clone, install, and build Zero (pinned SHA past v0.1.2)
        # vendor/zero/CURRENT/version.txt nominally reads 0.1.2, but the corpus's
        # ref.zero files use language features (`[expr; size]` array syntax, std.http
        # client) that landed on main after the v0.1.2 tag. The pin below is the
        # exact SHA used to author the corpus locally: PR #79 merge on vercel-labs/zero.
        # Refresh both this SHA and vendor/zero/CURRENT when the corpus is re-authored
        # against a newer Zero.
        env:
          ZERO_PINNED_SHA: 2f182253d15c34335d70ab80aef6d7a794803fd6
        run: |
          git clone https://github.com/vercel-labs/zero.git "${{ github.workspace }}/zero-src"
          cd "${{ github.workspace }}/zero-src"
          git checkout "$ZERO_PINNED_SHA"
          npm install
          make -C native/zero-c
          test -x bin/zero
          ./bin/zero --version

      - name: Run verify.sh across every corpus task
        env:
          ZERO: ${{ github.workspace }}/zero-src/bin/zero
          C_INCLUDE_PATH: /usr/include
          LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
        run: |
          fail=0
          for v in corpus/*/verify.sh; do
            echo "=== $(dirname "$v") ==="
            if ! bash "$v"; then
              fail=1
            fi
          done
          exit $fail
