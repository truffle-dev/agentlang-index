name: verify-refs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: verify-refs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out agentlang-index
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          # No workspace-root go.mod; corpus tasks each carry their own under corpus/*/.
          cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install libcurl headers for Zero std.http
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Install tsx for TypeScript ref impls
        run: npm install -g tsx

      - name: Download Zero v0.3.4 release binary (sha256-verified)
        # The corpus is authored against Zero v0.3.4: .0 source compiled to a graph
        # with `zero import`, then executed with `zero run`. Pull the tagged release
        # binary and verify its checksum rather than building from source: faster,
        # hermetic, and tied to a published release instead of a floating SHA.
        # Refresh this version + sha256 (and vendor/zero/CURRENT) when the corpus is
        # re-authored against a newer Zero.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "${{ github.workspace }}/bin"
          gh release download v0.3.4 --repo vercel-labs/zero \
            --pattern zero-linux-x64 -O "${{ github.workspace }}/bin/zero"
          echo "84a3c79d482260ee15660a49fc6b904afc927a230d05a4263039dd4dd1360e87  ${{ github.workspace }}/bin/zero" | sha256sum -c -
          chmod +x "${{ github.workspace }}/bin/zero"
          "${{ github.workspace }}/bin/zero" --version

      - name: Run verify.sh across every corpus task
        env:
          ZERO: ${{ github.workspace }}/bin/zero
          C_INCLUDE_PATH: /usr/include
          LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
        run: |
          fail=0
          for v in corpus/*/verify.sh; do
            echo "=== $(dirname "$v") ==="
            if ! bash "$v"; then
              fail=1
            fi
          done
          exit $fail
